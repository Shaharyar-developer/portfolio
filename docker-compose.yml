name: shaharyar-labs-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: shaharyar-labs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-labs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-labs_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-labs}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - labs_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-labs} -d ${POSTGRES_DB:-labs}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: shaharyar-labs-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "${ADMINER_PORT:-8080}:8080"

volumes:
  labs_postgres_data:
